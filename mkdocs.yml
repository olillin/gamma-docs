site_name: Gamma Docs
site_description: Documentation for Gamma, the authentication and authorization service for the Software Engineering Student Division (IT) at Chalmers.
repo_url: https://github.com/olillin/gamma-docs
edit_uri: edit/main/docs/
nav:
  - Home: index.md
  - API Reference:
      - 'api/index.md'
      - 'api/authorization.md'
      - 'api/openid.md'
      - 'api/client-api.md'
      - 'api/client-api-openapi.md'
      - 'api/info-api.md'
      - 'api/account-scaffold-api.md'
      - 'api/allow-list-api.md'
  - 'website.md'
  - 'history.md'
  - Links:
      - Gamma: 'https://auth.chalmers.it'
      - Gamma GitHub Repository: 'https://github.com/cthit/Gamma'
theme:
  name: material
  locale: en
  features:
    - content.action.view
    - content.action.edit
  icon:
    edit: material/pencil
    view: material/code-tags
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      primary: green
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
extra_css:
  - css/neoteroi-mkdocs.css
  - css/toc.css
markdown_extensions:
  - admonition:
  - toc:
      title: 'Table of Contents'
      permalink: true
      toc_depth: '2-3'
  - pymdownx.details:
  - pymdownx.magiclink:
  - pymdownx.extra:
plugins:
  - search
  - glightbox
  - swagger-ui-tag:
      tryItOutEnabled: true
  - neoteroi.contribs:
      contributors:
        - email: oli@olillin.com
          image: 'https://avatars.githubusercontent.com/u/55047947?s=400'
