# Format checks for Markdown
name: Format Markdown
on:
  push:
    paths:
      - "**/*.md"
  pull_request:
    paths:
      - "**/*.md"
permissions:
  contents: read
jobs:
  check-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v25
      - name: Check Markdown formatting
        run: nix develop --command mdformat --check .
